*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --blue:#002F87;--blue2:#003DA6;--blue-dark:#001B52;--blue-light:#E8EFF8;
  --gold:#C9A84C;--gold2:#E8C96A;--gold-light:#FBF5E6;
  --white:#FFFFFF;--bg:#F0F4FA;--border:#D4DCF0;--hover:#EBF0FA;
  --text:#001440;--text2:#3A4F7A;
}
html,body,#root{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Georgia',serif;background:var(--bg);-webkit-font-smoothing:antialiased}
/* Scrollbar */
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(0,47,135,.2);border-radius:3px}
.crm-wrap{display:flex;height:100vh;height:100dvh;background:var(--bg);font-size:13px;color:var(--text);overflow:hidden}
/* ── SIDEBAR ── */
.sidebar{width:222px;min-width:222px;background:var(--blue-dark);display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.sidebar-logo{padding:18px 14px 14px;border-bottom:1px solid rgba(201,168,76,.2);flex-shrink:0}
.logo-mark{display:flex;align-items:center;gap:10px}
.logo-av{width:36px;height:36px;border-radius:7px;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--blue-dark);letter-spacing:1px;flex-shrink:0}
.logo-text{color:#E8EFF8;font-size:13px;line-height:1.3}
.logo-sub{color:rgba(201,168,76,.65);font-size:9px;letter-spacing:2px;text-transform:uppercase;margin-top:1px}
.nav-grp-hdr{display:flex;align-items:center;justify-content:space-between;padding:9px 12px 4px;cursor:pointer;user-select:none;-webkit-user-select:none;min-height:36px}
.nav-grp-hdr:hover{background:rgba(255,255,255,.04)}
.nav-grp-lbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(201,168,76,.75);font-family:sans-serif;font-weight:600}
.nav-arrow{color:rgba(201,168,76,.55);font-size:9px;transition:transform .22s;display:inline-block;font-style:normal}
.nav-arrow.open{transform:rotate(90deg)}
.nav-items-wrap{overflow:hidden;transition:max-height .25s ease}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px 8px 16px;cursor:pointer;color:#9AB0D8;font-family:sans-serif;font-size:12px;transition:all .15s;border-left:2px solid transparent;min-height:40px}
.nav-item:hover{background:rgba(255,255,255,.07);color:#C8D8F0}
.nav-item.active{background:rgba(201,168,76,.14);color:var(--gold);border-left-color:var(--gold);font-weight:600}
.nav-solo{display:flex;align-items:center;gap:8px;padding:8px 10px 8px 14px;cursor:pointer;color:#9AB0D8;font-family:sans-serif;font-size:12px;transition:all .15s;border-left:2px solid transparent;min-height:40px}
.nav-solo:hover{background:rgba(255,255,255,.07);color:#C8D8F0}
.nav-solo.active{background:rgba(201,168,76,.14);color:var(--gold);border-left-color:var(--gold);font-weight:600}
.nav-sep{height:1px;background:rgba(255,255,255,.06);margin:6px 10px}
.nav-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0}
/* ── TOPBAR ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:52px;background:var(--white);border-bottom:2px solid var(--gold);display:flex;align-items:center;padding:0 16px;gap:8px;flex-shrink:0}
.tb-av{width:26px;height:26px;border-radius:5px;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--gold);letter-spacing:.5px;flex-shrink:0}
.tb-title{font-size:11px;color:var(--text2);font-family:sans-serif;font-weight:600;white-space:nowrap}
.tb-sep{color:var(--border);font-size:16px;flex-shrink:0}
.tb-page{font-size:12px;color:var(--blue);font-family:sans-serif;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-actions{margin-left:auto;display:flex;gap:6px;align-items:center;flex-shrink:0}
/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:4px;padding:7px 14px;border-radius:6px;cursor:pointer;font-size:11px;font-family:sans-serif;border:1.5px solid;transition:all .15s;user-select:none;-webkit-user-select:none;min-height:36px;touch-action:manipulation}
.btn-primary{background:var(--blue);color:var(--white);border-color:var(--blue)}
.btn-primary:hover,.btn-primary:active{background:var(--blue2)}
.btn-ghost{background:transparent;color:var(--text2);border-color:var(--border)}
.btn-ghost:hover,.btn-ghost:active{background:var(--hover)}
.btn-sm{padding:4px 8px;font-size:10px;min-height:28px}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px}
/* ── KPI ── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
@media(max-width:900px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
.kpi-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:16px;position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:0;left:0;width:100%;height:3px;background:linear-gradient(90deg,var(--blue),var(--gold))}
.kpi-label{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text2);font-family:sans-serif;margin-bottom:5px}
.kpi-value{font-size:24px;color:var(--blue)}
.kpi-sub{font-size:10px;color:var(--text2);margin-top:3px;font-family:sans-serif}
/* ── CARDS ── */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:900px){.dash-grid{grid-template-columns:1fr}}
.card{background:var(--white);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.card-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--blue);font-family:sans-serif;font-weight:700}
.card-body{padding:14px 16px}
.empty-state{text-align:center;padding:50px 20px;color:var(--text2)}
.empty-icon{font-size:36px;margin-bottom:14px;opacity:.25}
.empty-txt{font-size:12px;font-family:sans-serif;line-height:1.6}
/* ── FILTERS ── */
.filters{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.filter-select{padding:7px 9px;border:1.5px solid var(--border);border-radius:6px;background:var(--white);font-size:11px;font-family:sans-serif;color:var(--text2);cursor:pointer;min-height:36px;touch-action:manipulation}
.filter-select:focus{border-color:var(--blue);outline:none}
.search-box{flex:1;min-width:140px;padding:7px 10px;border:1.5px solid var(--border);border-radius:6px;background:var(--white);font-size:11px;font-family:sans-serif;min-height:36px}
.search-box:focus{border-color:var(--blue);outline:none}
/* ── TABLE ── */
.tbl{width:100%;border-collapse:collapse;font-family:sans-serif;font-size:11px}
.tbl th{padding:9px 10px;text-align:left;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--blue);border-bottom:2px solid var(--border);background:var(--blue-light);white-space:nowrap;font-weight:700}
.tbl td{padding:10px 10px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--hover)}
/* ── BADGES ── */
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-family:sans-serif;font-weight:600}
.badge-blue{background:#dce8f8;color:#002F87}
.badge-green{background:#dff2df;color:#1A5C1A}
.badge-gold{background:#fdf2d8;color:#7A5A10}
.badge-gray{background:#EEF0F5;color:#4A5580}
.badge-hc{background:#ede8f8;color:#3A1A7A}
.badge-red{background:#ffe8e8;color:#7A1A1A}
/* ── MODAL ── */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,15,60,.6);display:flex;align-items:center;justify-content:center;z-index:9999;padding:16px;overflow-y:auto}
.modal{background:var(--white);border-radius:12px;padding:24px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--border)}
.modal-title{font-size:15px;color:var(--blue);margin-bottom:16px;padding-bottom:10px;border-bottom:3px solid var(--gold)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:500px){.form-grid{grid-template-columns:1fr}}
.form-row{margin-bottom:12px}
.form-label{display:block;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--text2);margin-bottom:4px;font-family:sans-serif;font-weight:600}
.form-input,.form-select,.form-textarea{width:100%;padding:9px 10px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;color:var(--text);background:var(--white);font-family:sans-serif;-webkit-appearance:none;min-height:40px}
.form-input:focus,.form-select:focus{border-color:var(--blue);outline:none}
.form-textarea{resize:vertical;min-height:60px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}
/* ── PIPELINE ── */
.pipe-wrap{display:flex;gap:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:12px;min-height:280px}
.pipe-col{min-width:200px;background:var(--blue-light);border-radius:10px;padding:12px;flex-shrink:0;border:1px solid var(--border)}
.pipe-col-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.pipe-col-lbl{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--blue);font-family:sans-serif;font-weight:700}
.pipe-col-cnt{background:var(--blue);color:var(--white);border-radius:10px;padding:1px 8px;font-size:10px;font-family:sans-serif}
.prosp-mini{background:var(--white);border:1px solid var(--border);border-radius:7px;padding:10px;margin-bottom:7px;cursor:pointer;transition:border-color .15s}
.prosp-mini:hover{border-color:var(--gold)}
.prosp-mini-name{font-size:12px;font-weight:600;margin-bottom:3px;font-family:sans-serif;color:var(--blue)}
.prosp-mini-meta{font-size:10px;color:var(--text2);font-family:sans-serif}
/* ── SETTINGS ── */
.stabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:18px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.stab{padding:10px 15px;cursor:pointer;font-size:11px;font-family:sans-serif;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .15s;min-height:40px;display:flex;align-items:center}
.stab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:700}
.ss{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:14px}
.ss-title{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--blue);font-family:sans-serif;font-weight:700;margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid var(--gold)}
.nota-chip{display:inline-block;background:var(--gold-light);color:#7A5010;border:1px solid var(--gold);border-radius:3px;padding:1px 6px;font-size:9px;font-family:sans-serif}
.sku-row{display:grid;grid-template-columns:3fr 60px 80px 80px 28px;gap:6px;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)}
/* ── LOGIN ── */
.login-wrap{width:100%;height:100vh;height:100dvh;display:flex;align-items:center;justify-content:center;background:var(--blue-dark);padding:16px}
.login-card{background:rgba(255,255,255,.06);border:1px solid rgba(201,168,76,.3);border-radius:16px;padding:44px 40px;width:100%;max-width:380px;text-align:center}
@media(max-width:400px){.login-card{padding:32px 24px}}
.login-logo{width:68px;height:68px;border-radius:14px;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:var(--blue-dark);margin:0 auto 14px;letter-spacing:1px}
.login-brand{color:#fff;font-size:22px;margin-bottom:4px}
.login-sub{color:rgba(201,168,76,.8);font-size:10px;letter-spacing:3px;text-transform:uppercase;font-family:sans-serif;margin-bottom:30px}
.login-input{width:100%;padding:13px 14px;border:1px solid rgba(201,168,76,.35);border-radius:8px;background:rgba(255,255,255,.08);color:#fff;font-size:14px;margin-bottom:10px;font-family:sans-serif;outline:none;transition:border-color .15s;-webkit-appearance:none;min-height:48px;touch-action:manipulation}
.login-input:focus{border-color:var(--gold)}
.login-input::placeholder{color:rgba(255,255,255,.35)}
.login-btn{width:100%;padding:14px;border-radius:8px;background:var(--gold);color:var(--blue-dark);border:none;font-size:15px;cursor:pointer;transition:all .15s;margin-top:6px;font-weight:700;min-height:50px;touch-action:manipulation;-webkit-appearance:none}
.login-btn:hover,.login-btn:active{background:var(--gold2)}
.login-error{color:#ff8080;font-size:12px;font-family:sans-serif;margin-top:6px;min-height:18px}
.login-footer{color:rgba(201,168,76,.45);font-size:10px;font-family:sans-serif;margin-top:20px}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--blue-light);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--blue);font-family:sans-serif;flex-shrink:0;border:1px solid var(--border)}
.user-chip{display:flex;align-items:center;gap:6px;padding:4px 8px;border:1px solid var(--border);border-radius:20px;background:var(--white);cursor:default}
.user-chip-name{font-size:11px;font-family:sans-serif;color:var(--text2);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
</style>

  <script>
    (function() {
        function syncTopBarBtn() {
              var tbActions = document.querySelector('.tb-actions');
              var pageEl = document.querySelector('.tb-page');
              if (!tbActions || !pageEl) return;
              var currentPage = pageEl.textContent.trim();
              var existingBtn = tbActions.querySelector('.crm-top-agregar-btn');
              if (currentPage === 'Buscar / Agregar') {
                      if (!existingBtn) {
                                var btn = document.createElement('button');
                                btn.className = 'btn btn-primary crm-top-agregar-btn';
                                btn.style.marginRight = '8px';
                                btn.style.fontSize = '13px';
                                btn.style.padding = '6px 14px';
                                btn.textContent = '+ Agregar Prospecto';
                                btn.addEventListener('click', function() {
                                            var formBtn = document.querySelector('.card-body .btn.btn-primary');
                                            if (formBtn) formBtn.click();
                                });
                                var userChip = tbActions.querySelector('.user-chip');
                                if (userChip) tbActions.insertBefore(btn, userChip);
                                else tbActions.appendChild(btn);
                      }
              } else {
                      if (existingBtn) existingBtn.remove();
              }
        }
        var t = null;
        var obs = new MutationObserver(function() {
              if (t) clearTimeout(t);
              t = setTimeout(syncTopBarBtn, 50);
        });
        obs.observe(document.body, { childList: true, subtree: true });
        syncTopBarBtn();
    })();
  </script>
